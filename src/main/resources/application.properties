server.port=8080
spring.application.name=PDF Converter Application

# File upload settings
# Individual file size limit (per file in a batch)
spring.servlet.multipart.max-file-size=100MB
# Total request size limit (for batch uploads with multiple files)
spring.servlet.multipart.max-request-size=500MB

# Logging
logging.level.root=INFO
logging.level.com.pm.pdfconverterapplication=DEBUG

# CORS Configuration
# Set the allowed origin for cross-origin requests. Use the app's domain in production.
# Examples: http://localhost:8080, https://yourdomain.com
app.cors.allowed-origin=http://localhost:8080

# OpenAI API Configuration
# ADD YOUR OPENAI API KEY HERE: https://platform.openai.com/api-keys
ai.provider=openai
openai.api.key=sk-add-your-openai-api-key-here
openai.model=gpt-3.5-turbo

# Rate limiting (trust forwarded headers only when behind trusted proxies)
app.rate-limit.trust-forwarded-headers=false
app.rate-limit.trusted-proxies=

# Async processing settings
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100

# Task retention/cleanup settings
app.tasks.completed-retention-hours=2
app.tasks.processing-timeout-hours=6
app.tasks.cleanup-interval-ms=3600000

